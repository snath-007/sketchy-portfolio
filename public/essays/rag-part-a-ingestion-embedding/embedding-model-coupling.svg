<svg viewBox="0 0 900 360" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Mono', 'SF Mono', Menlo, monospace">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b4252"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="900" height="360" fill="#faf9f6"/>

  <text x="450" y="30" font-size="14" fill="#1c1f26" text-anchor="middle" letter-spacing="1" font-weight="700">EMBEDDING MODEL ↔ VECTOR DATABASE: COUPLED, NOT INDEPENDENT</text>

  <!-- Two boxes joined -->
  <rect x="70" y="70" width="280" height="100" rx="6" fill="#ffffff" stroke="#1e3a5f" stroke-width="1.8"/>
  <text x="210" y="100" font-size="13" fill="#1c1f26" text-anchor="middle" font-weight="700">Embedding Model</text>
  <text x="210" y="122" font-size="9.5" fill="#5b6270" text-anchor="middle">produces vector dimension</text>
  <text x="210" y="138" font-size="9.5" fill="#5b6270" text-anchor="middle">and similarity behavior</text>
  <text x="210" y="154" font-size="9.5" fill="#5b6270" text-anchor="middle">(cosine, dot product, Euclidean)</text>

  <rect x="550" y="70" width="280" height="100" rx="6" fill="#ffffff" stroke="#1e3a5f" stroke-width="1.8"/>
  <text x="690" y="100" font-size="13" fill="#1c1f26" text-anchor="middle" font-weight="700">Vector Database</text>
  <text x="690" y="122" font-size="9.5" fill="#5b6270" text-anchor="middle">indexed and configured</text>
  <text x="690" y="138" font-size="9.5" fill="#5b6270" text-anchor="middle">around that exact dimension</text>
  <text x="690" y="154" font-size="9.5" fill="#5b6270" text-anchor="middle">and metric</text>

  <!-- coupling link -->
  <line x1="350" y1="120" x2="548" y2="120" stroke="#1e3a5f" stroke-width="2.2"/>
  <circle cx="450" cy="120" r="16" fill="#1c1f26"/>
  <text x="450" y="124" font-size="11" fill="#faf9f6" text-anchor="middle" font-weight="700">=</text>
  <text x="450" y="150" font-size="9.5" fill="#8891a3" text-anchor="middle">coupled</text>

  <!-- what a model swap means -->
  <line x1="210" y1="170" x2="210" y2="210" stroke="#b0533f" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <text x="210" y="228" font-size="10" fill="#8a3a2a" text-anchor="middle" font-weight="700">A model change</text>

  <rect x="60" y="238" width="300" height="90" rx="6" fill="#ffffff" stroke="#b0533f" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="210" y="262" font-size="11" fill="#1c1f26" text-anchor="middle" font-weight="700">is NOT an in-place swap</text>
  <text x="210" y="284" font-size="9.5" fill="#5b6270" text-anchor="middle">vectors from two models aren't</text>
  <text x="210" y="298" font-size="9.5" fill="#5b6270" text-anchor="middle">comparable, even at the same</text>
  <text x="210" y="312" font-size="9.5" fill="#5b6270" text-anchor="middle">dimensionality</text>

  <!-- correct path -->
  <line x1="690" y1="170" x2="690" y2="210" stroke="#166534" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="690" y="228" font-size="10" fill="#166534" text-anchor="middle" font-weight="700">Treat it as a migration</text>

  <rect x="540" y="238" width="300" height="90" rx="6" fill="#ffffff" stroke="#166534" stroke-width="1.4"/>
  <text x="690" y="262" font-size="11" fill="#1c1f26" text-anchor="middle" font-weight="700">versioned re-embedding</text>
  <text x="690" y="284" font-size="9.5" fill="#5b6270" text-anchor="middle">new generation → evaluate on</text>
  <text x="690" y="298" font-size="9.5" fill="#5b6270" text-anchor="middle">held-out queries → cut over →</text>
  <text x="690" y="312" font-size="9.5" fill="#5b6270" text-anchor="middle">keep prior generation queryable</text>
</svg>
