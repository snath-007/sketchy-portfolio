<svg viewBox="0 0 900 340" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Mono', 'SF Mono', Menlo, monospace">
  <rect x="0" y="0" width="900" height="340" fill="#faf9f6"/>

  <text x="450" y="32" font-size="14" fill="#1c1f26" text-anchor="middle" letter-spacing="1" font-weight="700">COST AND EXIT, MODELED UP FRONT</text>
  <text x="450" y="50" font-size="10.5" fill="#8891a3" text-anchor="middle">two separate ledgers — what it costs to run, and what it costs to leave</text>

  <!-- Left column: cost model -->
  <rect x="40" y="76" width="380" height="240" rx="6" fill="#ffffff" stroke="#1e3a5f" stroke-width="1.8"/>
  <text x="60" y="102" font-size="12.5" fill="#1c1f26" font-weight="700">What it costs to run</text>
  <line x1="60" y1="112" x2="400" y2="112" stroke="#e2e5ea" stroke-width="1"/>

  <g font-size="10.5" fill="#3b4252">
    <text x="60" y="136">— Steady-state compute</text>
    <text x="60" y="158">— Peak compute (the surprise line)</text>
    <text x="60" y="180">— Storage growth, as a curve</text>
    <text x="60" y="202">— Egress (scales with success)</text>
    <text x="60" y="224">— Observability &amp; support tier</text>
    <text x="60" y="246">— Engineer time spent on workarounds</text>
  </g>
  <text x="60" y="280" font-size="9.5" fill="#8891a3" font-style="italic">Tag every resource by product from</text>
  <text x="60" y="294" font-size="9.5" fill="#8891a3" font-style="italic">day one — free now, expensive later.</text>

  <!-- Right column: exit path -->
  <rect x="480" y="76" width="380" height="240" rx="6" fill="#ffffff" stroke="#b0533f" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="500" y="102" font-size="12.5" fill="#1c1f26" font-weight="700">What it costs to leave</text>
  <line x1="500" y1="112" x2="840" y2="112" stroke="#e2e5ea" stroke-width="1"/>

  <text x="500" y="140" font-size="10.5" fill="#3b4252" font-weight="700">For any hard-to-replace service, write down —</text>
  <g font-size="10.5" fill="#3b4252">
    <text x="500" y="166">1. How you'd restore from backup</text>
    <text x="500" y="188">2. How you'd export data in usable form</text>
    <text x="500" y="210">3. What a credible replacement looks like</text>
  </g>
  <text x="500" y="244" font-size="9.5" fill="#8a3a2a" font-style="italic">Not because you expect to need it —</text>
  <text x="500" y="258" font-size="9.5" fill="#8a3a2a" font-style="italic">because &quot;we don't actually know&quot; is</text>
  <text x="500" y="272" font-size="9.5" fill="#8a3a2a" font-style="italic">cheapest to discover before it's load-bearing.</text>

</svg>
