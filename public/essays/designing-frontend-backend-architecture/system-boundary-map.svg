<svg viewBox="0 0 900 460" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Mono', 'SF Mono', Menlo, monospace">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b4252"/>
    </marker>
    <marker id="arrow-dash" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8891a3"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="460" fill="#faf9f6"/>

  <!-- Section label -->
  <text x="24" y="30" font-size="11" letter-spacing="2" fill="#8891a3">SYNCHRONOUS PATH</text>
  <line x1="24" y1="40" x2="230" y2="40" stroke="#c9cdd6" stroke-width="1"/>

  <text x="620" y="30" font-size="11" letter-spacing="2" fill="#8891a3">ASYNC PATH</text>
  <line x1="620" y1="40" x2="780" y2="40" stroke="#c9cdd6" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Nodes: main sync chain -->
  <g>
    <rect x="24" y="70" width="120" height="56" rx="4" fill="#ffffff" stroke="#2b2f38" stroke-width="1.4"/>
    <text x="84" y="93" font-size="13" fill="#1c1f26" text-anchor="middle" font-weight="600">Browser</text>
    <text x="84" y="110" font-size="10" fill="#8891a3" text-anchor="middle">client</text>
  </g>

  <g>
    <rect x="184" y="70" width="120" height="56" rx="4" fill="#ffffff" stroke="#2b2f38" stroke-width="1.4"/>
    <text x="244" y="93" font-size="13" fill="#1c1f26" text-anchor="middle" font-weight="600">CDN / Edge</text>
    <text x="244" y="110" font-size="10" fill="#8891a3" text-anchor="middle">cache, edge auth</text>
  </g>

  <g>
    <rect x="344" y="70" width="130" height="56" rx="4" fill="#ffffff" stroke="#2b2f38" stroke-width="1.4"/>
    <text x="409" y="93" font-size="13" fill="#1c1f26" text-anchor="middle" font-weight="600">Web App</text>
    <text x="409" y="110" font-size="10" fill="#8891a3" text-anchor="middle">SSR / client render</text>
  </g>

  <g>
    <rect x="514" y="70" width="130" height="56" rx="4" fill="#ffffff" stroke="#1e3a5f" stroke-width="1.8"/>
    <text x="579" y="93" font-size="13" fill="#1c1f26" text-anchor="middle" font-weight="700">Backend API</text>
    <text x="579" y="110" font-size="10" fill="#8891a3" text-anchor="middle">contract boundary</text>
  </g>

  <g>
    <rect x="684" y="70" width="150" height="56" rx="4" fill="#ffffff" stroke="#2b2f38" stroke-width="1.4"/>
    <text x="759" y="93" font-size="13" fill="#1c1f26" text-anchor="middle" font-weight="600">Primary DB</text>
    <text x="759" y="110" font-size="10" fill="#8891a3" text-anchor="middle">relational, source of truth</text>
  </g>

  <!-- sync arrows -->
  <line x1="144" y1="98" x2="182" y2="98" stroke="#3b4252" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="304" y1="98" x2="342" y2="98" stroke="#3b4252" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="474" y1="98" x2="512" y2="98" stroke="#3b4252" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="644" y1="98" x2="682" y2="98" stroke="#3b4252" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- Async branch -->
  <path d="M 579 126 L 579 220 L 700 220" fill="none" stroke="#8891a3" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arrow-dash)"/>
  <text x="600" y="212" font-size="10" fill="#8891a3">accepts &quot;eventually&quot;</text>

  <g>
    <rect x="700" y="192" width="120" height="56" rx="4" fill="#ffffff" stroke="#6b7280" stroke-width="1.4" stroke-dasharray="3 2"/>
    <text x="760" y="215" font-size="13" fill="#1c1f26" text-anchor="middle" font-weight="600">Queue</text>
    <text x="760" y="232" font-size="10" fill="#8891a3" text-anchor="middle">decoupled work</text>
  </g>

  <line x1="760" y1="248" x2="760" y2="286" stroke="#8891a3" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arrow-dash)"/>

  <g>
    <rect x="684" y="288" width="152" height="56" rx="4" fill="#ffffff" stroke="#6b7280" stroke-width="1.4" stroke-dasharray="3 2"/>
    <text x="760" y="311" font-size="13" fill="#1c1f26" text-anchor="middle" font-weight="600">Workers</text>
    <text x="760" y="328" font-size="10" fill="#8891a3" text-anchor="middle">the least-instrumented tier</text>
  </g>

  <!-- Observability band -->
  <rect x="24" y="380" width="810" height="56" rx="4" fill="#1c1f26"/>
  <text x="429" y="405" font-size="12" fill="#faf9f6" text-anchor="middle" letter-spacing="1" font-weight="600">LOGS · METRICS · TRACES</text>
  <text x="429" y="422" font-size="10" fill="#a9b0bf" text-anchor="middle">every box above — including the ones nobody remembers to check</text>

  <!-- connecting stems from each box down to observability band -->
  <line x1="84" y1="126" x2="84" y2="380" stroke="#d8dbe3" stroke-width="1"/>
  <line x1="244" y1="126" x2="244" y2="380" stroke="#d8dbe3" stroke-width="1"/>
  <line x1="409" y1="126" x2="409" y2="380" stroke="#d8dbe3" stroke-width="1"/>
  <line x1="579" y1="126" x2="579" y2="380" stroke="#d8dbe3" stroke-width="1"/>
  <line x1="759" y1="126" x2="759" y2="380" stroke="#d8dbe3" stroke-width="1"/>
  <line x1="760" y1="344" x2="760" y2="380" stroke="#d8dbe3" stroke-width="1"/>

  <text x="24" y="360" font-size="10.5" fill="#8891a3" font-style="italic">Solid arrows = caller waits. Dashed arrows = caller moved on.</text>
</svg>
