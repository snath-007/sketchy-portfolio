<svg viewBox="0 0 900 460" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Mono', 'SF Mono', Menlo, monospace">
  <rect x="0" y="0" width="900" height="460" fill="#faf9f6"/>

  <text x="450" y="30" font-size="14" fill="#1c1f26" text-anchor="middle" letter-spacing="1" font-weight="700">ANATOMY OF ONE REQUEST TRACE</text>
  <text x="450" y="48" font-size="10" fill="#8891a3" text-anchor="middle">everything below shares one trace ID, so &quot;why did it say that&quot; has one answer, not five</text>

  <!-- Central trace ID spine -->
  <rect x="380" y="70" width="140" height="40" rx="20" fill="#1c1f26"/>
  <text x="450" y="95" font-size="11" fill="#faf9f6" text-anchor="middle" font-weight="700">trace_id</text>

  <line x1="450" y1="110" x2="450" y2="130" stroke="#c9cdd6" stroke-width="1.4"/>
  <line x1="120" y1="130" x2="780" y2="130" stroke="#c9cdd6" stroke-width="1.4"/>

  <!-- 8 attribute nodes hanging below -->
  <!-- row 1 -->
  <g>
    <line x1="120" y1="130" x2="120" y2="150" stroke="#c9cdd6" stroke-width="1.2"/>
    <rect x="40" y="152" width="160" height="52" rx="4" fill="#ffffff" stroke="#2b2f38" stroke-width="1.2"/>
    <text x="120" y="172" font-size="9.5" fill="#1c1f26" text-anchor="middle" font-weight="700">User / session IDs</text>
    <text x="120" y="188" font-size="8" fill="#8891a3" text-anchor="middle">protected — a trace is sensitive too</text>
  </g>

  <g>
    <line x1="290" y1="130" x2="290" y2="150" stroke="#c9cdd6" stroke-width="1.2"/>
    <rect x="210" y="152" width="160" height="52" rx="4" fill="#ffffff" stroke="#2b2f38" stroke-width="1.2"/>
    <text x="290" y="172" font-size="9.5" fill="#1c1f26" text-anchor="middle" font-weight="700">Query transforms</text>
    <text x="290" y="188" font-size="8" fill="#8891a3" text-anchor="middle">original + rewritten</text>
  </g>

  <g>
    <line x1="460" y1="130" x2="460" y2="150" stroke="#c9cdd6" stroke-width="1.2"/>
    <rect x="380" y="152" width="160" height="52" rx="4" fill="#ffffff" stroke="#2b2f38" stroke-width="1.2"/>
    <text x="460" y="172" font-size="9.5" fill="#1c1f26" text-anchor="middle" font-weight="700">Filters applied</text>
    <text x="460" y="188" font-size="8" fill="#8891a3" text-anchor="middle">which, and why</text>
  </g>

  <g>
    <line x1="630" y1="130" x2="630" y2="150" stroke="#c9cdd6" stroke-width="1.2"/>
    <rect x="550" y="152" width="160" height="52" rx="4" fill="#ffffff" stroke="#2b2f38" stroke-width="1.2"/>
    <text x="630" y="172" font-size="9.5" fill="#1c1f26" text-anchor="middle" font-weight="700">Chunk IDs &amp; scores</text>
    <text x="630" y="188" font-size="8" fill="#8891a3" text-anchor="middle">retrieved and reranked</text>
  </g>

  <g>
    <line x1="780" y1="130" x2="780" y2="150" stroke="#c9cdd6" stroke-width="1.2"/>
    <rect x="700" y="152" width="160" height="52" rx="4" fill="#ffffff" stroke="#2b2f38" stroke-width="1.2"/>
    <text x="780" y="172" font-size="9.5" fill="#1c1f26" text-anchor="middle" font-weight="700">Prompt &amp; model version</text>
    <text x="780" y="188" font-size="8" fill="#8891a3" text-anchor="middle">exact, not &quot;latest&quot;</text>
  </g>

  <!-- row 2 -->
  <line x1="180" y1="204" x2="180" y2="224" stroke="#c9cdd6" stroke-width="1.2"/>
  <line x1="120" y1="224" x2="780" y2="224" stroke="#c9cdd6" stroke-width="1.4"/>

  <g>
    <line x1="180" y1="224" x2="180" y2="244" stroke="#c9cdd6" stroke-width="1.2"/>
    <rect x="100" y="246" width="160" height="52" rx="4" fill="#ffffff" stroke="#2b2f38" stroke-width="1.2"/>
    <text x="180" y="266" font-size="9.5" fill="#1c1f26" text-anchor="middle" font-weight="700">Token usage &amp; latency</text>
    <text x="180" y="282" font-size="8" fill="#8891a3" text-anchor="middle">per stage, not just total</text>
  </g>

  <g>
    <line x1="380" y1="224" x2="380" y2="244" stroke="#c9cdd6" stroke-width="1.2"/>
    <rect x="300" y="246" width="160" height="52" rx="4" fill="#ffffff" stroke="#8a3a2a" stroke-width="1.4"/>
    <text x="380" y="266" font-size="9.5" fill="#1c1f26" text-anchor="middle" font-weight="700">Guardrail decisions</text>
    <text x="380" y="282" font-size="8" fill="#8a3a2a" text-anchor="middle" font-weight="700">and their rationale</text>
  </g>

  <g>
    <line x1="580" y1="224" x2="580" y2="244" stroke="#c9cdd6" stroke-width="1.2"/>
    <rect x="500" y="246" width="160" height="52" rx="4" fill="#ffffff" stroke="#2b2f38" stroke-width="1.2"/>
    <text x="580" y="266" font-size="9.5" fill="#1c1f26" text-anchor="middle" font-weight="700">Citations produced</text>
    <text x="580" y="282" font-size="8" fill="#8891a3" text-anchor="middle">stable identifiers</text>
  </g>

  <g>
    <line x1="780" y1="224" x2="780" y2="244" stroke="#c9cdd6" stroke-width="1.2"/>
    <rect x="700" y="246" width="160" height="52" rx="4" fill="#ffffff" stroke="#2b2f38" stroke-width="1.2"/>
    <text x="780" y="266" font-size="9.5" fill="#1c1f26" text-anchor="middle" font-weight="700">User feedback</text>
    <text x="780" y="282" font-size="8" fill="#8891a3" text-anchor="middle">when available</text>
  </g>

  <!-- bottom policy band -->
  <rect x="100" y="330" width="700" height="70" rx="6" fill="#1c1f26"/>
  <text x="450" y="358" font-size="11.5" fill="#faf9f6" text-anchor="middle" font-weight="700">REDACTION AND RETENTION — DESIGNED IN, NOT RETROFITTED</text>
  <text x="450" y="378" font-size="9.5" fill="#a9b0bf" text-anchor="middle">a trace detailed enough to diagnose is detailed enough to be a liability if handled carelessly</text>
</svg>
