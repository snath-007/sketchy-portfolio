<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Mono', 'SF Mono', Menlo, monospace">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b4252"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="900" height="480" fill="#faf9f6"/>

  <text x="450" y="28" font-size="14" fill="#1c1f26" text-anchor="middle" letter-spacing="1" font-weight="700">LAYERED RAG SAFETY AND QUALITY CONTROLS</text>
  <text x="450" y="45" font-size="10" fill="#8891a3" text-anchor="middle">guardrails are threaded through the path, not a gate at either end</text>

  <!-- Outer observability frame -->
  <rect x="20" y="70" width="860" height="330" rx="8" fill="none" stroke="#1c1f26" stroke-width="1.4" stroke-dasharray="2 3"/>
  <text x="36" y="92" font-size="10" fill="#1c1f26" font-weight="700">OBSERVABILITY — traces at every stage</text>

  <!-- Main path -->
  <g>
    <rect x="44" y="120" width="130" height="70" rx="4" fill="#ffffff" stroke="#2b2f38" stroke-width="1.4"/>
    <text x="109" y="148" font-size="10.5" fill="#1c1f26" text-anchor="middle" font-weight="700">Input Policy</text>
    <text x="109" y="164" font-size="8.5" fill="#8891a3" text-anchor="middle">scope &amp; abuse control</text>
  </g>
  <line x1="174" y1="155" x2="200" y2="155" stroke="#3b4252" stroke-width="1.6" marker-end="url(#arr)"/>

  <g>
    <rect x="204" y="120" width="130" height="70" rx="4" fill="#ffffff" stroke="#8a3a2a" stroke-width="1.8"/>
    <text x="269" y="144" font-size="10.5" fill="#1c1f26" text-anchor="middle" font-weight="700">Authorization</text>
    <text x="269" y="160" font-size="8.5" fill="#8a3a2a" text-anchor="middle" font-weight="700">mandatory, from Part B</text>
  </g>
  <line x1="334" y1="155" x2="360" y2="155" stroke="#3b4252" stroke-width="1.6" marker-end="url(#arr)"/>

  <g>
    <rect x="364" y="120" width="130" height="70" rx="4" fill="#ffffff" stroke="#2b2f38" stroke-width="1.4"/>
    <text x="429" y="144" font-size="10.5" fill="#1c1f26" text-anchor="middle" font-weight="700">Retrieval</text>
    <text x="429" y="160" font-size="8.5" fill="#8891a3" text-anchor="middle">untrusted content in</text>
  </g>
  <line x1="494" y1="155" x2="520" y2="155" stroke="#3b4252" stroke-width="1.6" marker-end="url(#arr)"/>

  <g>
    <rect x="524" y="120" width="150" height="70" rx="4" fill="#ffffff" stroke="#2b2f38" stroke-width="1.4"/>
    <text x="599" y="144" font-size="10.5" fill="#1c1f26" text-anchor="middle" font-weight="700">Grounded</text>
    <text x="599" y="158" font-size="10.5" fill="#1c1f26" text-anchor="middle" font-weight="700">Generation</text>
    <text x="599" y="174" font-size="8.5" fill="#8891a3" text-anchor="middle">docs are evidence, not orders</text>
  </g>
  <line x1="674" y1="155" x2="700" y2="155" stroke="#3b4252" stroke-width="1.6" marker-end="url(#arr)"/>

  <g>
    <rect x="704" y="120" width="150" height="70" rx="4" fill="#ffffff" stroke="#8a3a2a" stroke-width="1.8"/>
    <text x="779" y="140" font-size="10" fill="#1c1f26" text-anchor="middle" font-weight="700">Citation &amp; Output</text>
    <text x="779" y="154" font-size="10" fill="#1c1f26" text-anchor="middle" font-weight="700">Validation</text>
    <text x="779" y="170" font-size="8.5" fill="#8a3a2a" text-anchor="middle" font-weight="700">last check, not only check</text>
  </g>

  <line x1="779" y1="190" x2="779" y2="220" stroke="#3b4252" stroke-width="1.6" marker-end="url(#arr)"/>

  <g>
    <rect x="700" y="224" width="158" height="50" rx="4" fill="#1c1f26"/>
    <text x="779" y="254" font-size="11" fill="#faf9f6" text-anchor="middle" font-weight="700">Response</text>
  </g>

  <!-- Abstention branch -->
  <line x1="599" y1="190" x2="599" y2="230" stroke="#b0533f" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <g>
    <rect x="440" y="234" width="180" height="50" rx="4" fill="#ffffff" stroke="#b0533f" stroke-width="1.4" stroke-dasharray="4 3"/>
    <text x="530" y="254" font-size="10" fill="#8a3a2a" text-anchor="middle" font-weight="700">Explicit Abstention</text>
    <text x="530" y="268" font-size="8.5" fill="#8a3a2a" text-anchor="middle">a real code path, not a hope</text>
  </g>

  <!-- Evaluation suite band -->
  <rect x="44" y="316" width="810" height="60" rx="4" fill="#ffffff" stroke="#1e3a5f" stroke-width="1.6"/>
  <text x="449" y="342" font-size="11.5" fill="#1c1f26" text-anchor="middle" font-weight="700">EVALUATION SUITE</text>
  <text x="449" y="360" font-size="9" fill="#5b6270" text-anchor="middle">scores recall, ranking, groundedness, relevance, refusal behavior — against a versioned, adversarial test set</text>

  <text x="450" y="424" font-size="10" fill="#8891a3" text-anchor="middle" font-style="italic">Solid border = flow. Dashed red = mandatory security or safety control.</text>
</svg>
